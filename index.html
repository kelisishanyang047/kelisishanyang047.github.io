<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>个人AI作品集</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a1a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow-x: hidden;
      position: relative;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(20, 20, 40, 0.6);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2.5rem;
      padding: 3rem 2.5rem;
      max-width: 700px;
      width: 90%;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 255, 255, 0.08);
      color: #fff;
      transition: transform 0.3s ease;
      margin: 2rem 0;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .avatar {
      width: 100px;
      height: 100px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      border-radius: 50%;
      margin: 0 auto 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
    }

    h1 {
      text-align: center;
      font-size: 2.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    .subtitle {
      text-align: center;
      color: #a5b4fc;
      font-size: 1.1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 1.5rem;
    }

    .typing-box {
      background: rgba(0, 0, 0, 0.35);
      border-radius: 1.5rem;
      padding: 1.5rem 1.8rem;
      margin: 1.5rem 0 2rem;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 1.1rem;
      color: #e0e7ff;
      border-left: 4px solid #818cf8;
      min-height: 70px;
      display: flex;
      align-items: center;
      word-break: break-word;
    }

    .cursor::after {
      content: '|';
      color: #c4b5fd;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .projects {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.2rem;
      margin-top: 1rem;
    }

    .project-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 1.2rem;
      border-radius: 1.2rem;
      transition: background 0.3s, transform 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .project-item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.02);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .project-item h3 {
      font-size: 1.3rem;
      margin-bottom: 0.3rem;
    }

    .project-item p {
      color: #cbd5e1;
      font-size: 0.9rem;
    }

    .footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: #94a3b8;
    }

    .footer a {
      color: #a5b4fc;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .projects {
        grid-template-columns: 1fr;
      }
      .card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <canvas id="starsCanvas"></canvas>

  <div class="card">
    <div class="avatar">🤖</div>
    <h1>AI 探索者</h1>
    <div class="subtitle">机器学习 · 自然语言处理 · 创意生成</div>

    <div class="typing-box">
      <span id="typingText" class="cursor"></span>
    </div>

    <div class="projects">
      <div class="project-item">
        <h3>🧠 智能对话助手</h3>
        <p>基于Transformer的上下文理解引擎</p>
      </div>
      <div class="project-item">
        <h3>🎨 图像风格迁移</h3>
        <p>神经风格转换与实时渲染</p>
      </div>
      <div class="project-item">
        <h3>📊 数据分析AI</h3>
        <p>自动化洞察与可视化生成</p>
      </div>
      <div class="project-item">
        <h3>✍️ 创意写作模型</h3>
        <p>多体裁内容生成与润色</p>
      </div>
    </div>

    <div class="footer">
      🌐 持续更新中 · <a href="#">GitHub</a> · <a href="#">联系我</a>
    </div>
  </div>

  <script>
    (function() {
      // 星空背景
      const canvas = document.getElementById('starsCanvas');
      const ctx = canvas.getContext('2d');
      let stars = [];
      let width, height;

      function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initStars();
      }

      function initStars() {
        const count = Math.floor(width * height / 1500);
        stars = [];
        for (let i = 0; i < count; i++) {
          stars.push({
            x: Math.random() * width,
            y: Math.random() * height,
            radius: Math.random() * 2.2 + 0.6,
            alpha: Math.random(),
            delta: Math.random() * 0.02 + 0.005
          });
        }
      }

      function drawStars() {
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#ffffff';
        for (let s of stars) {
          ctx.globalAlpha = s.alpha;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
          ctx.fill();
          // 闪烁
          s.alpha += s.delta;
          if (s.alpha > 0.9 || s.alpha < 0.2) s.delta = -s.delta;
        }
        ctx.globalAlpha = 1;
        requestAnimationFrame(drawStars);
      }

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();
      drawStars();

      // 打字机效果
      const textElement = document.getElementById('typingText');
      const phrases = [
        '用代码构建智能的未来。',
        '让机器理解人类语言。',
        '探索生成式AI的无限可能。',
        '数据驱动，创意无界。'
      ];
      let phraseIndex = 0;
      let charIndex = 0;
      let isDeleting = false;
      let currentText = '';

      function typeEffect() {
        const fullPhrase = phrases[phraseIndex];

        if (isDeleting) {
          currentText = fullPhrase.substring(0, charIndex - 1);
          charIndex--;
        } else {
          currentText = fullPhrase.substring(0, charIndex + 1);
          charIndex++;
        }

        textElement.textContent = currentText;

        let typeSpeed = isDeleting ? 40 : 80;

        if (!isDeleting && charIndex === fullPhrase.length) {
          typeSpeed = 1500; // 打完停一会
          isDeleting = true;
        } else if (isDeleting && charIndex === 0) {
          isDeleting = false;
          phraseIndex = (phraseIndex + 1) % phrases.length;
          typeSpeed = 300;
        }

        setTimeout(typeEffect, typeSpeed);
      }

      // 确保初始文本为空，加上光标类
      textElement.textContent = '';
      textElement.classList.add('cursor');
      setTimeout(typeEffect, 500);
    })();
  </script>
</body>
</html>
